version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:80"
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=Scheduler_db;User Id=myUser;Password=mustafa@1031998;TrustServerCertificate=True;
    networks:
      - backend

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
    command: >
      /bin/bash -c "
      /opt/mssql/bin/sqlservr & 
      sleep 20 &&
      /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Your_password123 -Q \"
        CREATE DATABASE Scheduler_db;
        CREATE LOGIN myUser WITH PASSWORD = 'mustafa@1031998', CHECK_POLICY = OFF;
        USE Scheduler_db;
        CREATE USER myUser FOR LOGIN myUser;
        ALTER ROLE db_owner ADD MEMBER myUser;\" 
      && tail -f /dev/null"
    networks:
      - backend

volumes:
  sqlvolume:

networks:
  backend:
